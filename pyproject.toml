# ── Workspace root ───────────────────────────────────────────────────────────
# This file is the uv workspace root only.  It contains no package of its own.
# Each package manages its own metadata in its subdirectory.
#
#   thalamus/           production runtime  (scoring, oracle, selection)
#   thalamus_research/  research tooling    (baselines, evaluation, R1-R5)
#
# Usage:
#   uv sync                         install both packages
#   uv sync --package thalamus      install production only
#   uv run thalamus-score  ...
#   uv run thalamus-oracle ...
#   uv run thalamus-select ...
#   uv run thalamus-research ...

[tool.uv.workspace]
members = ["thalamus", "thalamus_research"]
